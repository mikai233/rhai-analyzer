name: VSCode Package

on:
  workflow_dispatch:

jobs:
  vscode-package:
    name: VSCode Extension Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/vscode/package-lock.json

      - name: Install VSCode client dependencies
        working-directory: clients/vscode
        run: npm ci

      - name: Build VSCode extension
        working-directory: clients/vscode
        run: npm run build

      - name: Package VSCode extension
        working-directory: clients/vscode
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: rhai-analyzer-vsix
          path: clients/vscode/.artifacts/*.vsix
